[tool.ruff]
line-length = 120
exclude = [
    "src/action_highlight.py",
    "src/guide_path.py",
    "src/system_cursor.py",
    "src/cursor_tracker.py",
    "src/buddy_icon.py",
    "src/buddy_window.py",
    "src/chat_panel.py",
    "src/speech_bubble.py",
    "src/status_window.py",
    "src/ai_client_api.py",
    "src/ai_client.py",
]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501", "E701", "E702", "E402", "F841"]

[tool.pytest.ini_options]
testpaths = ["tests"]
